<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Save my contact</title>
  <meta name="description" content="Add me to your contacts" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="card" role="main">
    <div class="avatar" id="avatar">
      <!-- If you add photo.jpg it will be shown; otherwise initials are used. -->
      <img src="photo.jpg" alt="" id="avatar-img" onerror="this.style.display='none'" />
      <span class="initials" id="initials">FL</span>
    </div>

    <h1 class="name" id="name">Firstname Lastname</h1>
    <p class="role" id="role">Role · Company / Brand</p>

    <ul class="details">
      <li><a href="tel:+46700000000">+46 70 000 00 00</a></li>
      <li><a href="mailto:name@example.com">name@example.com</a></li>
      <li><a href="https://example.com" target="_blank" rel="noopener">example.com</a></li>
    </ul>

    <a class="save-btn" id="save-btn" href="contact.vcf" download="contact.vcf">
      Save contact
    </a>

    <p class="hint" id="hint">Preparing your contact card…</p>
  </main>

  <script src="script.js"></script>
</body>
</html>
